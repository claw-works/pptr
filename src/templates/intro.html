<div class="slide" style="width:1920px;height:1080px;position:relative;overflow:hidden;font-family:'{{theme.headingFont}}',sans-serif;background:{{theme.backgroundColor}};">
  <div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 120px;">
    <div style="flex:1;display:flex;flex-direction:column;gap:24px;">
      <h1 style="font-size:72px;font-weight:700;color:{{theme.textColor}};margin:0;line-height:1.1;">
        {{content.title}}
      </h1>
      <div style="width:80px;height:4px;background:{{theme.primaryColor}};border-radius:2px;"></div>
      <p style="font-size:24px;color:{{theme.textColor}};opacity:0.7;margin:0;max-width:600px;line-height:1.6;">
        {{content.subtitle}}
      </p>
      {% if content.author %}
      <div style="margin-top:40px;display:flex;align-items:center;gap:16px;">
        <div style="width:48px;height:48px;border-radius:50%;background:{{theme.primaryColor}};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:18px;">
          {{content.author[0]}}
        </div>
        <div>
          <div style="font-size:18px;font-weight:600;color:{{theme.textColor}};">{{content.author}}</div>
          {% if content.date %}<div style="font-size:14px;color:{{theme.textColor}};opacity:0.5;">{{content.date}}</div>{% endif %}
        </div>
      </div>
      {% endif %}
    </div>
    {% if content.imageUrl %}
    <div style="flex:1;display:flex;justify-content:center;">
      <img src="{{content.imageUrl}}" style="max-width:100%;max-height:700px;border-radius:16px;object-fit:cover;" />
    </div>
    {% endif %}
  </div>
</div>
