<div class="slide" style="width:1920px;height:1080px;position:relative;overflow:hidden;font-family:'{{theme.bodyFont}}',sans-serif;background:{{theme.backgroundColor}};">
  <div style="position:absolute;inset:0;display:flex;">
    <div style="flex:1;padding:100px 80px;display:flex;flex-direction:column;justify-content:center;gap:24px;">
      <h2 style="font-size:44px;font-weight:700;color:{{theme.textColor}};margin:0;line-height:1.2;">{{content.title}}</h2>
      <div style="width:60px;height:3px;background:{{theme.primaryColor}};border-radius:2px;"></div>
      <p style="font-size:20px;color:{{theme.textColor}};opacity:0.75;line-height:1.7;margin:0;">{{content.description}}</p>
      {% if content.bullets %}
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:12px;">
        {% for bullet in content.bullets %}
        <div style="display:flex;align-items:center;gap:12px;font-size:18px;color:{{theme.textColor}};opacity:0.8;">
          <div style="width:6px;height:6px;border-radius:50%;background:{{theme.primaryColor}};"></div>
          <span>{{bullet}}</span>
        </div>
        {% endfor %}
      </div>
      {% endif %}
    </div>
    <div style="flex:1;position:relative;">
      <img src="{{content.imageUrl}}" style="width:100%;height:100%;object-fit:cover;" />
    </div>
  </div>
</div>
